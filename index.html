    <!-- ================= JAVASCRIPT ================= -->
    <script>
        const words = ["connects", "moves", "grows"];
        let isAnimating = false;

        document.addEventListener("DOMContentLoaded", () => {
            startLoadingSequence();
            setupInteractions();
            setupSwipeToClose();
        });

        const sleep = (ms) => new Promise(resolve => setTimeout(resolve, ms));

        // --- Typing Animation & Transition ---
        async function startLoadingSequence() {
            if(isAnimating) return;
            isAnimating = true;

            const dynamicTextElement = document.getElementById("dynamic-text");
            const loadingScreen = document.getElementById('loading-screen');
            const businessCard = document.getElementById('business-card');
            const cardInfo = document.getElementById('card-info');

            // Reset initial states
            dynamicTextElement.innerText = "";
            loadingScreen.style.display = 'flex';
            loadingScreen.classList.remove('opacity-0');
            businessCard.classList.add('hidden', 'opacity-0');
            cardInfo.classList.remove('opacity-100');
            cardInfo.classList.add('opacity-0');

            const typeSpeed = 100, deleteSpeed = 50, pauseEnd = 1200, pauseStart = 400;

            for (let i = 0; i < words.length; i++) {
                let word = words[i];
                for (let j = 0; j <= word.length; j++) {
                    dynamicTextElement.innerText = word.substring(0, j);
                    await sleep(typeSpeed);
                }
                if (i === words.length - 1) {
                    await sleep(1500); 
                    break; 
                }
                await sleep(pauseEnd); 
                for (let j = word.length; j >= 0; j--) {
                    dynamicTextElement.innerText = word.substring(0, j);
                    await sleep(deleteSpeed);
                }
                await sleep(pauseStart); 
            }

            // Transition out loading
            loadingScreen.classList.add('opacity-0');
            
            setTimeout(() => {
                loadingScreen.style.display = 'none';
                businessCard.classList.remove('hidden');
                
                setTimeout(() => {
                    businessCard.classList.remove('opacity-0');
                    businessCard.classList.add('opacity-100');
                    
                    setTimeout(() => {
                        cardInfo.classList.remove('opacity-0');
                        cardInfo.classList.add('opacity-100');
                        isAnimating = false; // Allow restart
                    }, 600); 
                }, 50);
            }, 1000); 
        }

        // --- Slide Up Menu Logic ---
        function openMenu(menuId) {
            const menu = document.getElementById(menuId);
            const backdrop = document.getElementById('menu-backdrop');
            
            backdrop.classList.remove('hidden');
            setTimeout(() => backdrop.classList.remove('opacity-0'), 10);
            
            menu.classList.remove('translate-y-full');
        }

        function closeAllMenus() {
            const backdrop = document.getElementById('menu-backdrop');
            const menus = document.querySelectorAll('.slide-menu');
            
            menus.forEach(menu => menu.classList.add('translate-y-full'));
            backdrop.classList.add('opacity-0');
            
            setTimeout(() => backdrop.classList.add('hidden'), 300);
        }

        function setupSwipeToClose() {
            const menus = document.querySelectorAll('.slide-menu');
            menus.forEach(menu => {
                let startY;
                menu.addEventListener('touchstart', (e) => {
                    startY = e.touches[0].clientY;
                }, {passive: true});

                menu.addEventListener('touchmove', (e) => {
                    let currentY = e.touches[0].clientY;
                    if (currentY - startY > 50) { // If swiped down by 50px
                        closeAllMenus();
                    }
                }, {passive: true});
            });
        }

        // --- Double Tap & Hold (Long Press) Logic ---
        function setupInteractions() {
            const card = document.getElementById('business-card');
            
            // Double Tap
            let lastTap = 0;
            card.addEventListener('touchend', function(e) {
                // Prevent trigger if clicking a button inside the card
                if(e.target.closest('button') || e.target.closest('a')) return;

                let currentTime = new Date().getTime();
                let tapLength = currentTime - lastTap;
                
                if (tapLength < 400 && tapLength > 0) {
                    startLoadingSequence(); 
                    e.preventDefault();
                }
                lastTap = currentTime;
            });

            // For Desktop double click
            card.addEventListener('dblclick', function(e) {
                if(e.target.closest('button') || e.target.closest('a')) return;
                startLoadingSequence();
            });

            // Tap and Hold to Download vCard
            let pressTimer;
            
            const startPress = (e) => {
                if(e.target.closest('button') || e.target.closest('a')) return;
                pressTimer = window.setTimeout(downloadVCard, 800); // 800ms hold
            };

            const cancelPress = () => {
                clearTimeout(pressTimer);
            };

            card.addEventListener('touchstart', startPress, {passive: true});
            card.addEventListener('touchend', cancelPress);
            card.addEventListener('touchcancel', cancelPress);
            card.addEventListener('touchmove', cancelPress, {passive: true});
            
            card.addEventListener('mousedown', startPress);
            card.addEventListener('mouseup', cancelPress);
            card.addEventListener('mouseleave', cancelPress);
        }

        // --- Generate and Download vCard ---
        function downloadVCard() {
            const vcard = `BEGIN:VCARD
VERSION:3.0
FN:Ramon Garcia
TITLE:Executive Chairman
ORG:DFNN Inc.
TEL;TYPE=CELL:+639178421888
EMAIL:rcgarcia@dfnn.com
URL:https://www.dfnn.com
ADR:;;L2-L5 14/F PSE Tower, 5th Ave cor 28th St;Bonifacio Global City;Taguig;;Philippines
END:VCARD`;
            
            const blob = new Blob([vcard], { type: "text/vcard" });
            const url = URL.createObjectURL(blob);
            
            const a = document.createElement("a");
            a.href = url;
            a.download = "Ramon_Garcia.vcf";
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            
            // Provide a small visual feedback (vibrate if supported)
            if (navigator.vibrate) navigator.vibrate(100);
            alert("Contact downloaded!");
        }
    </script>
